services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bonfire
      POSTGRES_USER: bonfire
      POSTGRES_PASSWORD: bonfire
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://bonfire:bonfire@db:5432/bonfire
      SECRET_KEY: change-me-in-production
    depends_on:
      - db

volumes:
  pgdata:
